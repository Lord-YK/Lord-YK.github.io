<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>SIGMA</title>
    <link rel="stylesheet" href="./main.css">
    <link rel="stylesheet" href="sigma.css">
    <!--link rel="icon" href="./favicon.ico" type="image/x-icon"-->
  </head>
  <body>


    <main>
        <div class="wrapper">
            <form name="sigmaform" id="sigmaform">
                <table id="sigmatab">
                    <tr height="10px">
                        
                        <td style="padding-bottom: 0px;">
                            <label for="ulim"></label>
                            <input type="text" id="ulim" name="ulim" />
                        </td>
                        
                    </tr>
                    <tr>
                        
                        <td>
                            <span id="sigmasym">Σ<span>
                        </td>
                        <td style="text-align: left; padding-left: 5px;">
                            <label for="formula"></label>
                            <input type="text" id="formula" name="formula" style="width: 15ch"/>
                        </td>
                        
                    </tr>
                    <tr height="10px" >
                        
                        <td>
                            <nobr><span id="sigmai" >i=</span>
                            <label for="llim"></label>
                            <input type="text" id="llim" name="llim" /></nobr>
                        </td>
                        <td style="text-align: left">
                            <label for="sigmasubmit"></label>
                            <input type="button" id="sigmasubmit" name="sigmasumbit" value="Calculate" onclick="calcSigma()"/>
                        </td>
                    </tr>
                    
                </table>
            </form>
        </div>
    </main>

    
	<script src="sigma.js"></script>
  </body>
</html>
